<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Leads Portal | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --discord-dark: #313338;
            --discord-darker: #2b2d31;
            --discord-darkest: #1e1f22;
            --discord-blurple: #5865f2;
            --discord-text: #dbdee1;
            --discord-muted: #949ba4;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--discord-darkest);
            color: var(--discord-text);
        }

        .discord-card { 
            background-color: var(--discord-dark); 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .discord-input {
            background-color: var(--discord-darkest);
            border: 1px solid transparent;
            color: #ffffff;
            transition: border 0.2s ease;
        }

        .discord-input:focus {
            border-color: var(--discord-blurple);
        }

        .btn-blurple {
            background-color: var(--discord-blurple);
            transition: background-color 0.2s ease;
        }

        .btn-blurple:hover {
            background-color: #4752c4;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: var(--discord-darkest);
        }
        textarea::-webkit-scrollbar-thumb {
            background: #1a1b1e;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="agentStep" class="discord-card max-w-sm w-full p-8 transition-all duration-300">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-white mb-1">Welcome back!</h2>
            <p class="text-[var(--discord-muted)] text-sm">We're so excited to see you again!</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Select Agent</label>
                <select id="agentSelect" class="discord-input w-full p-3 rounded-md outline-none cursor-pointer appearance-none">
                    <option value="" disabled selected>Choose your name...</option>
                    <option>Andy</option>
                    <option>Jackson</option>
                    <option>Mark</option>
                    <option>Justin</option>
                    <option>Jason</option>
                    <option>Derek</option>
                    <option>Eric</option>
                </select>
            </div>
            
            <button onclick="showForm()" class="btn-blurple w-full text-white font-medium py-3 rounded-md shadow-lg active:scale-[0.98]">
                Login to CRM
            </button>
        </div>
    </div>

    <div id="formStep" class="hidden discord-card max-w-2xl w-full p-8">
        <div class="flex justify-between items-center mb-8 border-b border-[var(--discord-darker)] pb-4">
            <div>
                <h1 class="text-xl font-bold text-white uppercase tracking-tight">Leads Disposition Form</h1>
                <p class="text-[var(--discord-muted)] text-xs mt-1">Status: <span class="text-green-400 font-medium">● Online</span></p>
            </div>
            <div id="displayAgent" class="bg-[var(--discord-darker)] text-[var(--discord-text)] px-4 py-2 rounded text-sm font-semibold border border-white/5"></div>
        </div>

        <form id="leadsForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Client/Business Name</label>
                <input type="text" id="clientName" required class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Phone Number</label>
                <input type="tel" id="phone" required placeholder="555-0123" class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Country</label>
                <select id="country" onchange="updateStates()" required class="discord-input w-full p-3 rounded-md outline-none cursor-pointer">
                    <option value="">Select Country</option>
                    <option value="USA">USA</option>
                    <option value="Canada">Canada</option>
                </select>
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">State / Province</label>
                <select id="state" required class="discord-input w-full p-3 rounded-md outline-none cursor-pointer">
                    <option value="">Select State</option>
                </select>
            </div>

            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Lead Source</label>
                <input type="text" id="leadSource" placeholder="e.g. Inbound Call, PPC Ad" class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Lead Remarks</label>
                <textarea id="remarks" rows="4" class="discord-input w-full p-3 rounded-md outline-none resize-none"></textarea>
            </div>

            <div class="col-span-2 pt-2">
                <button type="submit" id="submitBtn" class="btn-blurple w-full text-white font-bold py-4 rounded-md shadow-lg active:scale-[0.99] flex items-center justify-center gap-2">
                    Submit Lead
                </button>
            </div>
        </form>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497251232966901780/sFl-vzXtXVAsoccAZVoVnNb_sFR2yHu8TSuqyBtGECUfTCmQ1aDWcuUPteMsMMybefHE";

        const stateList = {
            USA: ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"],
            Canada: ["Alberta", "British Columbia", "Manitoba", "New Brunswick", "Newfoundland and Labrador", "Nova Scotia", "Ontario", "Prince Edward Island", "Quebec", "Saskatchewan", "Northwest Territories", "Nunavut", "Yukon"]
        };

        function showForm() {
            const agent = document.getElementById('agentSelect').value;
            if(!agent) return;
            document.getElementById('agentStep').classList.add('hidden');
            document.getElementById('formStep').classList.remove('hidden');
            document.getElementById('displayAgent').innerText = agent;
        }

        function updateStates() {
            const country = document.getElementById('country').value;
            const stateSelect = document.getElementById('state');
            stateSelect.innerHTML = '<option value="">Select State</option>';
            if(country && stateList[country]) {
                stateList[country].forEach(s => {
                    const el = document.createElement('option');
                    el.value = s; el.textContent = s;
                    stateSelect.appendChild(el);
                });
            }
        }

        document.getElementById('leadsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Syncing...`;

            const payload = {
                username: "Internal CRM Bot",
                avatar_url: "https://cdn0.iconfinder.com/data/icons/free-social-media-set/24/discord-512.png",
                embeds: [{
                    title: "Lead Entry Submitted",
                    color: 5814783, // Discord Blurple
                    thumbnail: { url: "https://i.imgur.com/8NBa8pW.png" },
                    fields: [
                        { name: "👤 Sales Agent", value: `\`${document.getElementById('agentSelect').value}\``, inline: true },
                        { name: "🏢 Client Name", value: document.getElementById('clientName').value, inline: true },
                        { name: "📞 Phone No.", value: document.getElementById('phone').value, inline: true },
                        { name: "🌎 Location", value: `${document.getElementById('state').value}, ${document.getElementById('country').value}`, inline: true },
                        { name: "📑 Source", value: document.getElementById('leadSource').value || "N/A", inline: true },
                        { name: "💬 Remarks", value: document.getElementById('remarks').value || "None provided" }
                    ],
                    footer: { text: "System Logs • " + new Date().toLocaleTimeString() }
                }]
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    btn.style.backgroundColor = "#248046"; // Discord Green
                    btn.innerHTML = "✓ Successfully Submitted";
                    setTimeout(() => location.reload(), 1500);
                } else { throw new Error(); }
            } catch (err) {
                alert("Discord connection failed.");
                btn.disabled = false;
                btn.innerHTML = "Retry Submission";
            }
        });
    </script>
</body>
</html>
