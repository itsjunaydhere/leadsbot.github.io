<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Leads Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .glass-card { background: rgba(255, 255, 255, 1); border: 1px solid #e2e8f0; }
        .input-style { @apply w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

    <div id="agentStep" class="glass-card max-w-md w-full p-8 rounded-2xl shadow-2xl transition-all duration-500">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Length16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Agent Portal</h2>
            <p class="text-gray-500">Select your name to start recording leads</p>
        </div>
        
        <select id="agentSelect" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none cursor-pointer">
            <option value="" disabled selected>Choose Agent Name...</option>
            <option>Andy</option>
            <option>Jackson</option>
            <option>Mark</option>
            <option>Justin</option>
            <option>Jason</option>
            <option>Derek</option>
            <option>Eric</option>
        </select>
        
        <button onclick="showForm()" class="w-full mt-6 bg-indigo-600 text-white font-semibold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-[0.98]">
            Launch Leads Form
        </button>
    </div>

    <div id="formStep" class="hidden glass-card max-w-2xl w-full p-8 rounded-2xl shadow-2xl">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Leads Disposition Form</h1>
                <p class="text-gray-500 text-sm">Fill in the details below to sync with Discord</p>
            </div>
            <span id="displayAgent" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md"></span>
        </div>

        <form id="leadsForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="col-span-1">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Client/Business Name</label>
                <input type="text" id="clientName" required placeholder="Acme Corp" class="input-style">
            </div>

            <div class="col-span-1">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Phone No.</label>
                <input type="tel" id="phone" required placeholder="+1 (555) 000-0000" class="input-style">
            </div>

            <div class="col-span-1">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Country</label>
                <select id="country" onchange="updateStates()" required class="input-style cursor-pointer">
                    <option value="">Select Country</option>
                    <option value="USA">USA</option>
                    <option value="Canada">Canada</option>
                </select>
            </div>

            <div class="col-span-1">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">State / Province</label>
                <select id="state" required class="input-style cursor-pointer">
                    <option value="">Select State</option>
                </select>
            </div>

            <div class="col-span-2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Lead Source</label>
                <input type="text" id="leadSource" placeholder="e.g. Website, LinkedIn, Facebook Ad" class="input-style">
            </div>

            <div class="col-span-2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Lead Remarks</label>
                <textarea id="remarks" rows="3" placeholder="Enter specific details about the lead interaction..." class="input-style resize-none"></textarea>
            </div>

            <div class="col-span-2 mt-2">
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all shadow-lg active:scale-[0.99] flex items-center justify-center gap-2">
                    Submit to Pipeline
                </button>
            </div>
        </form>
    </div>

    <script>
        // WEBHOOK INTEGRATED
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497251232966901780/sFl-vzXtXVAsoccAZVoVnNb_sFR2yHu8TSuqyBtGECUfTCmQ1aDWcuUPteMsMMybefHE";

        const locationData = {
            USA: ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"],
            Canada: ["Alberta", "British Columbia", "Manitoba", "New Brunswick", "Newfoundland and Labrador", "Nova Scotia", "Ontario", "Prince Edward Island", "Quebec", "Saskatchewan", "Northwest Territories", "Nunavut", "Yukon"]
        };

        function showForm() {
            const agent = document.getElementById('agentSelect').value;
            if(!agent) {
                alert("Please select your agent name first.");
                return;
            }
            document.getElementById('agentStep').classList.add('hidden');
            document.getElementById('formStep').classList.remove('hidden');
            document.getElementById('displayAgent').innerText = `Agent: ${agent}`;
        }

        function updateStates() {
            const country = document.getElementById('country').value;
            const stateSelect = document.getElementById('state');
            stateSelect.innerHTML = '<option value="">Select State</option>';
            
            if(country && locationData[country]) {
                locationData[country].forEach(state => {
                    const opt = document.createElement('option');
                    opt.value = state;
                    opt.innerHTML = state;
                    stateSelect.appendChild(opt);
                });
            }
        }

        document.getElementById('leadsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalBtnText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...`;

            const payload = {
                username: "Lead Logger Bot",
                embeds: [{
                    title: "✨ New Lead Captured",
                    description: `A new lead has been recorded by **${document.getElementById('agentSelect').value}**`,
                    color: 5793266, // Modern Indigo color
                    fields: [
                        { name: "🏢 Client/Business", value: document.getElementById('clientName').value, inline: true },
                        { name: "📞 Phone Number", value: document.getElementById('phone').value, inline: true },
                        { name: "📍 Location", value: `${document.getElementById('state').value}, ${document.getElementById('country').value}`, inline: true },
                        { name: "🔍 Lead Source", value: document.getElementById('leadSource').value || "Not Specified", inline: true },
                        { name: "📝 Remarks", value: document.getElementById('remarks').value || "No remarks provided." }
                    ],
                    footer: { text: "Internal Sales System" },
                    timestamp: new Date()
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    btn.classList.replace('bg-slate-900', 'bg-emerald-500');
                    btn.innerHTML = "✓ Lead Logged Successfully";
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                } else {
                    throw new Error();
                }
            } catch (err) {
                alert("Failed to send to Discord. Please verify your connection.");
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        });
    </script>
</body>
</html>
