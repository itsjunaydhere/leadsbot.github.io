<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Leads Portal | Session Lock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --discord-dark: #313338;
            --discord-darker: #2b2d31;
            --discord-darkest: #1e1f22;
            --discord-blurple: #5865f2;
            --discord-text: #dbdee1;
            --discord-muted: #949ba4;
            --discord-green: #23a559;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--discord-darkest);
            color: var(--discord-text);
        }

        .discord-card { 
            background-color: var(--discord-dark); 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .discord-input {
            background-color: var(--discord-darkest);
            border: 1px solid transparent;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .discord-input:focus {
            border-color: var(--discord-blurple);
        }

        .btn-blurple {
            background-color: var(--discord-blurple);
        }

        .btn-blurple:hover {
            background-color: #4752c4;
        }

        /* Success Toast Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            animation: slideUp 0.3s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="successToast" class="hidden fixed bottom-5 right-5 toast bg-[var(--discord-green)] text-white px-6 py-3 rounded-md shadow-2xl z-50 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span class="font-bold">Lead sent to Discord!</span>
    </div>

    <div id="agentStep" class="discord-card max-w-sm w-full p-8">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-white mb-1">Agent Login</h2>
            <p class="text-[var(--discord-muted)] text-sm">Select your name to start your shift</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Internal ID</label>
                <select id="agentSelect" class="discord-input w-full p-3 rounded-md outline-none cursor-pointer appearance-none">
                    <option value="" disabled selected>Select Agent...</option>
                    <option>Andy</option>
                    <option>Jackson</option>
                    <option>Mark</option>
                    <option>Justin</option>
                    <option>Jason</option>
                    <option>Derek</option>
                    <option>Eric</option>
                    <option>Usman</option>
                    <option>Isaac</option>
                    <option>John Mason</option>
                </select>
            </div>
            
            <button onclick="showForm()" class="btn-blurple w-full text-white font-medium py-3 rounded-md shadow-lg active:scale-[0.98] transition-all">
                Enter Sales Floor
            </button>
        </div>
    </div>

    <div id="formStep" class="hidden discord-card max-w-2xl w-full p-8">
        <div class="flex justify-between items-center mb-8 border-b border-[var(--discord-darker)] pb-4">
            <div>
                <h1 class="text-xl font-bold text-white uppercase tracking-tight">Leads Disposition Form</h1>
                <p class="text-[var(--discord-muted)] text-xs mt-1 italic">Session Locked • Shift Active</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="displayAgent" class="bg-[var(--discord-darker)] text-indigo-300 px-4 py-2 rounded text-sm font-bold border border-indigo-500/30"></div>
                <button onclick="location.reload()" class="text-[var(--discord-muted)] hover:text-red-400 text-xs underline decoration-dotted">Logout</button>
            </div>
        </div>

        <form id="leadsForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Client/Business Name</label>
                <input type="text" id="clientName" required class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Phone Number</label>
                <input type="tel" id="phone" required placeholder="000-000-0000" class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Country</label>
                <select id="country" onchange="updateStates()" required class="discord-input w-full p-3 rounded-md outline-none cursor-pointer">
                    <option value="">Select Country</option>
                    <option value="USA">USA</option>
                    <option value="Canada">Canada</option>
                </select>
            </div>

            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">State / Province</label>
                <select id="state" required class="discord-input w-full p-3 rounded-md outline-none cursor-pointer">
                    <option value="">Select State</option>
                </select>
            </div>

            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Lead Source</label>
                <input type="text" id="leadSource" placeholder="Direct, Social, etc." class="discord-input w-full p-3 rounded-md outline-none">
            </div>

            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-[var(--discord-muted)] uppercase tracking-wider mb-2">Lead Remarks</label>
                <textarea id="remarks" rows="3" class="discord-input w-full p-3 rounded-md outline-none resize-none"></textarea>
            </div>

            <div class="col-span-2 pt-2">
                <button type="submit" id="submitBtn" class="btn-blurple w-full text-white font-bold py-4 rounded-md shadow-lg active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                    Submit Disposition
                </button>
            </div>
        </form>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497251232966901780/sFl-vzXtXVAsoccAZVoVnNb_sFR2yHu8TSuqyBtGECUfTCmQ1aDWcuUPteMsMMybefHE";

        const stateList = {
            USA: ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"],
            Canada: ["Alberta", "British Columbia", "Manitoba", "New Brunswick", "Newfoundland and Labrador", "Nova Scotia", "Ontario", "Prince Edward Island", "Quebec", "Saskatchewan", "Northwest Territories", "Nunavut", "Yukon"]
        };

        function showForm() {
            const agent = document.getElementById('agentSelect').value;
            if(!agent) return;
            document.getElementById('agentStep').classList.add('hidden');
            document.getElementById('formStep').classList.remove('hidden');
            document.getElementById('displayAgent').innerText = `Agent: ${agent}`;
        }

        function updateStates() {
            const country = document.getElementById('country').value;
            const stateSelect = document.getElementById('state');
            stateSelect.innerHTML = '<option value="">Select State</option>';
            if(country && stateList[country]) {
                stateList[country].forEach(s => {
                    const el = document.createElement('option');
                    el.value = s; el.textContent = s;
                    stateSelect.appendChild(el);
                });
            }
        }

        function showToast() {
            const toast = document.getElementById('successToast');
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 4000);
        }

        document.getElementById('leadsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const agent = document.getElementById('agentSelect').value;
            
            btn.disabled = true;
            btn.innerHTML = `Syncing...`;

            const payload = {
                username: "Pipeline Monitor",
                embeds: [{
                    title: "📥 Lead Disposition Received",
                    color: 5814783,
                    fields: [
                        { name: "Sales Agent", value: `**${agent}**`, inline: true },
                        { name: "Client", value: document.getElementById('clientName').value, inline: true },
                        { name: "Phone", value: document.getElementById('phone').value, inline: true },
                        { name: "Location", value: `${document.getElementById('state').value}, ${document.getElementById('country').value}`, inline: true },
                        { name: "Source", value: document.getElementById('leadSource').value || "N/A", inline: true },
                        { name: "Remarks", value: document.getElementById('remarks').value || "No remarks provided" }
                    ],
                    timestamp: new Date()
                }]
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    // Success UI logic
                    showToast();
                    
                    // Clear only lead-specific inputs, keep agent name
                    document.getElementById('leadsForm').reset();
                    document.getElementById('state').innerHTML = '<option value="">Select State</option>';
                    
                    btn.disabled = false;
                    btn.innerHTML = "Submit Disposition";
                } else { throw new Error(); }
            } catch (err) {
                alert("Failed to send. Please check your internet connection.");
                btn.disabled = false;
                btn.innerHTML = "Retry Submission";
            }
        });
    </script>
</body>
</html>
